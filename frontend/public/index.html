<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Live Chord Prediction" />
    <link rel="stylesheet" href="style.css" />
    <title>Live Chord Prediction</title>
  </head>
  <body>
    <div id="root"></div>
    <div class="container">
      <h1>Live Chord Prediction</h1>
      <div id="status-bar" class="status-bar status-disconnected">Backend: odpojeno</div>
      <div class="form-group">
        <label for="mic">Vyber mikrofon:</label>
        <select id="mic"></select>
      </div>
      <button id="startBtn" disabled>Start Live Prediction</button>
      <div class="prediction-box">
        <div class="prediction-main">
          <span id="prediction-label">Predikce akordu:</span>
          <span id="prediction">-</span>
        </div>
        <div class="prediction-details">
          <div><span class="detail-label">Stabilní akord:</span> <span id="stableChord">-</span></div>
          <div><span class="detail-label">Jistota:</span> <span id="confidence">-</span></div>
        </div>
        <div id="topCandidates" class="top-candidates"></div>
      </div>
      <div class="api-section">
        <h2>Info o modelu</h2>
        <ul id="modelInfo"><li>Načítání...</li></ul>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
